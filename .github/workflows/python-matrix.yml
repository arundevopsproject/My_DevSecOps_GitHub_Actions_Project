
name: python-lint

on:
    push:
        branches: [main]


jobs:
    validae:
        runs-on: ubuntu-laetst

        steps:
            - name: Check-out code
              uses: actions/checkout@v4

            - name: setup python
              uses: actions/setup-python@v5
              with:
                python-version: "3.13"

            - name: install dependencies
              run: pin install -r requirements.txt

            - name: run linter
              run: flake8 app.py
              



            


         