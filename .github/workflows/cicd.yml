# this is the name of the workflow which will display on Actions tab
name: cicd

# manual click (deliver) workflow whenever user needs
on:
  workflow_dispatch: 
    inputs:
      environment:
        description: This is the envoronment value where workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:

  # job 1
  code:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        run: echo "Code clone from GithUb"

  # job 2
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker container build" 

  # job 3
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"

  # job 4
  deploy:
    if: inputs.environment == 'dev' 
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the Apps
        run: echo "Docker compode deployed the Apps" 
  
